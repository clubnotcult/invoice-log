        <div style="padding:5px 11px;font-size:10px;color:var(--fin2);letter-spacing:.1em;text-transform:uppercase;background:var(--fin-bg);border-bottom:1px solid var(--fin-border)">Stripe Processing Fee</div>
        <div style="display:flex;justify-content:space-between;padding:5px 11px;font-size:12px;border-bottom:1px solid var(--border)">
          <span style="color:var(--text2)">Creative Services Subtotal</span>
          <span class="mono-num">${$m(inv.total_amount - inv.stripe_fee_amount)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:5px 11px;font-size:12px;border-bottom:1px solid var(--border)">
          <span style="color:var(--text2)">Stripe Processing Fee</span>
          <span class="mono-num">${$m(inv.stripe_fee_amount)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:5px 11px;font-size:13px;font-weight:600;border-bottom:1px solid var(--border)">
          <span>Invoice Total</span><span class="mono-num amber">${$m(inv.total_amount)}</span>
        </div>
        <div style="display:flex;justify-content:space-between;padding:5px 11px 7px;font-size:11px;color:var(--green2)">
          <span>Estimated Net Received</span>
          <span class="mono-num">${$m(inv.total_amount - inv.total_amount*0.029 - 0.30)}</span>
        </div>
      </div>` : ''}

      <!-- Stripe section -->
      <div style="border:1px solid var(--border);border-radius:var(--r);overflow:hidden">
        <div style="padding:6px 11px;font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--border)">Stripe</div>
        <div style="padding:12px 11px">
          ${hasStripeId ? `
          <div style="display:flex;flex-direction:column;gap:8px">
            <div style="display:flex;align-items:center;gap:8px;font-size:12px">
              <span style="color:var(--text3)">ID</span>
              <span class="mono-num" style="color:var(--text2)">${esc(inv.stripe_invoice_id)}</span>
            </div>
            <div style="display:flex;gap:8px">
              <button class="btn btn-fin btn-sm" id="open-stripe-btn">↗ Open in Stripe</button>
              <button class="btn btn-ghost btn-sm" id="copy-link-btn">⎘ Copy Link</button>
              <button class="btn btn-ghost btn-sm" id="sync-status-btn">↻ Sync Status</button>
            </div>
            <div id="stripe-status-row" style="font-size:11px;color:var(--text3)"></div>
          </div>` : `
          <div style="display:flex;flex-direction:column;gap:10px">
            ${!client?.email ? `<div style="font-size:11px;color:var(--red2)">⚠ Client has no email — add one in Settings before pushing to Stripe.</div>` : ''}
            <button class="btn btn-fin" id="send-stripe-btn" ${!client?.email?'disabled':''}>
              ↑ Send to Stripe
            </button>
            <div id="stripe-push-status" style="font-size:11px;color:var(--text3)"></div>
          </div>`}
        </div>
      </div>
    </div>
    <div class="modal-ftr">
      ${inv.status==='draft' ? '<button class="btn btn-ghost" id="mark-sent">Mark as Sent</button>' : ''}
      ${inv.status==='sent'  ? '<button class="btn btn-green"  id="mark-paid">Mark as Paid ✓</button>' : ''}
      ${inv.status==='paid'  ? '<span style="font-size:12px;color:var(--green2)">✓ Paid</span>' : ''}
    </div>`,true);

  mo.querySelector('#m-close').onclick = () => ov.remove();

  if (mo.querySelector('#mark-sent')) mo.querySelector('#mark-sent').onclick = async () => {
    await sb.from('invoices').update({status:'sent'}).eq('id',inv.id); ov.remove(); fetchAll();
  };
  if (mo.querySelector('#mark-paid')) mo.querySelector('#mark-paid').onclick = async () => {
    await sb.from('invoices').update({status:'paid'}).eq('id',inv.id); ov.remove(); fetchAll();
  };

  // ── Already has Stripe ID ────────────────────────────────────
  if (hasStripeId) {
    const stripeUrl = `https://dashboard.stripe.com/invoices/${inv.stripe_invoice_id}`;
    if (mo.querySelector('#open-stripe-btn')) {
      mo.querySelector('#open-stripe-btn').onclick = () => window.open(stripeUrl, '_blank');
    }
    if (mo.querySelector('#copy-link-btn')) {
      mo.querySelector('#copy-link-btn').onclick = async () => {
        // Fetch the hosted invoice URL from Stripe
        const btn = mo.querySelector('#copy-link-btn');
        btn.textContent = '…'; btn.disabled = true;
        try {
          const res = await fetch('/api/stripe', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ action:'get_invoice_status', payload:{ stripe_invoice_id: inv.stripe_invoice_id } }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          if (data.hosted_invoice_url) {
            await navigator.clipboard.writeText(data.hosted_invoice_url);
            btn.textContent = '✓ Copied';
            setTimeout(()=>{ btn.textContent='⎘ Copy Link'; btn.disabled=false; }, 2000);
          } else {
            throw new Error('No hosted URL available yet');
          }
        } catch(e) {
          alert('Could not copy link: ' + e.message);
          btn.textContent = '⎘ Copy Link'; btn.disabled = false;
        }
      };
    }
    if (mo.querySelector('#sync-status-btn')) {
      mo.querySelector('#sync-status-btn').onclick = async () => {
        const btn = mo.querySelector('#sync-status-btn');
        const row = mo.querySelector('#stripe-status-row');
        btn.textContent = '…'; btn.disabled = true;
        try {
          const res = await fetch('/api/stripe', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ action:'get_invoice_status', payload:{ stripe_invoice_id: inv.stripe_invoice_id } }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          row.innerHTML = `Stripe status: <span style="color:var(--amber)">${data.status}</span>${data.amount_paid>0?` · Paid: ${$m(data.amount_paid/100)}`:''}`;
          // Auto-update local status if Stripe shows paid
          if (data.status === 'paid' && inv.status !== 'paid') {
            await sb.from('invoices').update({status:'paid'}).eq('id',inv.id);
            fetchAll();
          }
        } catch(e) {
          row.innerHTML = `<span style="color:var(--red2)">Error: ${esc(e.message)}</span>`;
        }
        btn.textContent = '↻ Sync Status'; btn.disabled = false;
      };
    }

  // ── No Stripe ID yet — push button ──────────────────────────
  } else if (mo.querySelector('#send-stripe-btn')) {
    mo.querySelector('#send-stripe-btn').onclick = async () => {
      const btn  = mo.querySelector('#send-stripe-btn');
      const stat = mo.querySelector('#stripe-push-status');
      btn.disabled = true; btn.textContent = 'Connecting…';

      try {
        // Step 1: find or create customer
        stat.textContent = 'Finding Stripe customer…';
        const custRes = await fetch('/api/stripe', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            action: 'find_or_create_customer',
            payload: { name: client.name, email: client.email },
          }),
        });
        const custData = await custRes.json();
        if (custData.error) throw new Error(custData.error);
        const customerId = custData.customer.id;
        stat.textContent = custData.created
          ? `Created new Stripe customer`
          : `Found existing customer: ${custData.customer.name||custData.customer.email}`;

        // Step 2+3: build structured line items with section headers
        const stripeFeeItem = inv.stripe_fee_amount ? {
          description: 'Stripe Processing Fee',
          amount_cents: Math.round(Number(inv.stripe_fee_amount) * 100),
        } : null;
        const lineItems = buildStripeLineItems(invEnts, stripeFeeItem);

        // Step 4: create invoice in Stripe
        stat.textContent = 'Creating invoice in Stripe…';
        const invRes = await fetch('/api/stripe', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            action: 'create_invoice',
            payload: {
              customer_id:    customerId,
              line_items:     lineItems,
              stripe_fee_item: null, // already included in lineItems
              invoice_log_id: inv.id,
              client_name:    client.name,
            },
          }),
        });
        const invData = await invRes.json();
        if (invData.error) throw new Error(invData.error);

        // Step 5: save stripe_invoice_id back to Supabase
        await sb.from('invoices').update({
          stripe_invoice_id: invData.stripe_invoice_id,
          status: 'sent',
        }).eq('id', inv.id);

        stat.innerHTML = `<span style="color:var(--green2)">✓ Created in Stripe as draft — review before sending to client</span>`;
        btn.textContent = '✓ Pushed';
        await fetchAll();

        // Show the open in Stripe button immediately
        setTimeout(() => {
          const stripeUrl = `https://dashboard.stripe.com/invoices/${invData.stripe_invoice_id}`;
          stat.innerHTML += `<br><button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="window.open('${stripeUrl}','_blank')">↗ Open in Stripe Dashboard</button>`;
        }, 300);

      } catch(e) {
        stat.innerHTML = `<span style="color:var(--red2)">⚠ ${esc(e.message)}</span>`;
        btn.disabled = false; btn.textContent = '↑ Send to Stripe';
      }
    };
  }
}

// Format date as M.DD (no leading zero on month, padded day)
function stripeDate(dateStr) {
  if(!dateStr) return '';
  const [,mm,dd] = dateStr.split('-');
  return `${parseInt(mm,10)}.${dd}`;
}

// Single line item label: "M.DD - Title (Xhr)" for time-based, "M.DD - Title" for packages
function buildLineDescription(e) {
  const prefix = stripeDate(e.date);
  const base   = prefix ? `${prefix} - ${e.title}` : e.title;
  // Append (Xhr) for any entry with hours > 0 that is NOT flat-fee/package
  const isTimeBased = (e.hours && Number(e.hours) > 0)
    && e.type !== 'package'
    && e.billing_mode !== 'flat_fee'
    && e.billing_mode !== 'preset';
  if (isTimeBased) {
    const hrs = Number(e.hours);
    const hStr = Number.isInteger(hrs) ? `${hrs}hr` : `${hrs}hr`;
    return `${base} (${hStr})`;
  }
  return base;
}

// Build full structured Stripe line items matching app grouping
// Returns array of { description, amount_cents }
// Section headers are $0.00 items acting as visual separators
function buildStripeLineItems(entries, stripeFeeItem) {
  const STRIPE_GROUP_LABELS = {
    shoot:          'VIDEO SHOOTS',
    edit:           'VIDEO EDITS',
    graphic_design: 'GRAPHIC DESIGN',
    render:         '3D RENDERS',
    package:        'PACKAGES',
  };
  const groups = {};
  GROUP_ORDER.forEach(g => { groups[g] = []; });
  entries.forEach(e => {
    const g = entryGroup(e);
    if(!groups[g]) groups[g] = [];
    groups[g].push(e);
  });
  // Sort each group chronologically
  Object.values(groups).forEach(arr => arr.sort((a,b)=>a.date.localeCompare(b.date)));

  const items = [];
  GROUP_ORDER.forEach(grp => {
    const ents = groups[grp];
    if(!ents.length) return;
    const subtotal = ents.reduce((s,e)=>s+Number(e.computed_total||0),0);
    // Section header — $0.00 separator
    items.push({
      description: `${STRIPE_GROUP_LABELS[grp]} — ${new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}).format(subtotal)}`,
      amount_cents: 0,
    });
    // Line items — M.DD - Title (no descriptors)
    ents.forEach(e => {
      items.push({
        description: buildLineDescription(e),
        amount_cents: Math.round(Number(e.computed_total) * 100),
      });
    });
  });

  if(stripeFeeItem) {
    items.push(stripeFeeItem);
  }
  return items;
}

// ── Entry Detail Sheet ────────────────────────────────────────
// Opens a bottom sheet with full project info + contextual actions.
// tab = 'in_progress' | 'completed' | 'invoiced'
function openEntryDetailSheet(e, client, tab, { onEdit, onDelete, onFinish, onReopen, onUnlock }) {
  // helpers
  const status = workStatus(e);
  const pri    = duePriority(e.due_date);
  const dueColor = { overdue:'#e06060', today:'#d4843a', soon:'#c8a84a' }[pri] || 'var(--text2)';

  function rateDetail() {
    if (e.type==='package'||e.billing_mode==='flat_fee'||e.billing_mode==='preset') return 'Package / flat fee';
    if (e.type==='shoot')  return e.billing_mode==='day_rate'?'Day rate':`${e.hours}h @ ${$m(e.rate_override||client?.default_rates?.shoot_hourly_rate||0)}/hr`;
    if (e.type==='edit')   return `${e.duration_minutes} min · ${EDIT_CATS[e.category]?.label||e.category||'Basic'} (×${EDIT_CATS[e.category]?.mult||1})`;
    if (e.type==='graphic_design') return `${e.hours}h @ ${$m(e.rate_override||client?.default_rates?.graphic_design_hourly_rate||0)}/hr`;
    if (e.type==='render') return `${e.hours}h @ ${$m(e.rate_override||client?.default_rates?.render_hourly_rate||0)}/hr`;
    return '';
  }

  // link to invoice if invoiced
  const inv = e.invoice_id ? STATE.invoices.find(i=>i.id===e.invoice_id) : null;
  const invLabel = inv ? `#${inv.id.slice(0,8).toUpperCase()} · ${inv.status}` : null;

  // Build info cells
  const infoCells = [
    { label:'Client',      val: esc(client?.name||'—') },
    { label:'Work date',   val: $d(e.date)||'—' },
    { label:'Type',        val: `<span class="badge badge-${e.type==='graphic_design'?'gfx':e.type||'shoot'}">${e.type==='graphic_design'?'GFX':(e.type||'').toUpperCase()}</span>` },
    { label:'Rate',        val: esc(rateDetail()) },
    e.due_date ? { label:'Due date', val:`<span style="color:${dueColor};font-weight:600">${fmtDue(e.due_date)}</span>` } : null,
    invLabel    ? { label:'Invoice',  val:`<span class="fin-color">${esc(invLabel)}</span>` } : null,
  ].filter(Boolean);

  // Actions by context
  function actionsHTML() {
    if (status === 'in_progress') return `
      <div class="sheet-action-row">
        <button class="btn btn-primary" id="sh-finish" style="flex:1;justify-content:center">✓ Mark complete</button>
        <button class="btn btn-ghost" id="sh-edit" style="flex:1;justify-content:center">✎ Edit</button>
      </div>
      <button class="btn btn-danger" id="sh-del" style="width:100%;justify-content:center">Delete entry</button>`;
    if (status === 'completed') return `
      <div class="sheet-action-row">
        <button class="btn btn-ghost" id="sh-edit" style="flex:1;justify-content:center">✎ Edit</button>
        <button class="btn btn-ghost" id="sh-reopen" style="flex:1;justify-content:center">↩ Reopen project</button>
      </div>
      <button class="btn btn-danger" id="sh-del" style="width:100%;justify-content:center">Delete entry</button>`;
    if (status === 'invoiced') return `
      ${inv && inv.status==='draft' ? `<button class="btn btn-ghost" id="sh-unlock" style="width:100%;justify-content:center">↩ Remove from invoice</button>` : ''}
      <button class="btn btn-danger" id="sh-del" style="width:100%;justify-content:center;opacity:.6" id="sh-del">Delete entry</button>`;
    return '';
  }

  const ov = document.createElement('div');
  ov.className = 'sheet-overlay';
  ov.innerHTML = `
    <div class="sheet">
      <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
      <div class="sheet-hdr">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div style="flex:1;min-width:0">
            <div class="sheet-title">${esc(e.title)}</div>
            <div class="sheet-sub">${esc(client?.name||'')}</div>
          </div>
          <button class="btn btn-ghost btn-sm" id="sh-close" style="flex-shrink:0;margin-left:8px">✕</button>
        </div>
      </div>
      <div class="sheet-amount">${$m(e.computed_total)}</div>
      <div class="sheet-amount-label">${status==='invoiced'?'invoiced':status==='in_progress'?'in progress':'ready to bill'}</div>
      <div class="sheet-info">
        ${infoCells.map(c=>`<div class="sheet-info-cell"><div class="sheet-info-label">${c.label}</div><div class="sheet-info-val">${c.val}</div></div>`).join('')}
      </div>
      <div class="sheet-actions">
        ${actionsHTML()}
      </div>
    </div>`;

  document.body.appendChild(ov);

  function close() { ov.remove(); }

  ov.addEventListener('click', ev => { if(ev.target===ov) close(); });
  ov.querySelector('#sh-close').onclick = close;

  const shEdit   = ov.querySelector('#sh-edit');
  const shDel    = ov.querySelector('#sh-del');
  const shFinish = ov.querySelector('#sh-finish');
  const shReopen = ov.querySelector('#sh-reopen');
  const shUnlock = ov.querySelector('#sh-unlock');

  if (shEdit)   shEdit.onclick   = () => { close(); onEdit(); };
  if (shFinish) shFinish.onclick = () => { close(); onFinish(); };
  if (shReopen) shReopen.onclick = () => { close(); onReopen(); };
  if (shUnlock) shUnlock.onclick = () => { close(); onUnlock(); };
  if (shDel)    shDel.onclick    = () => {
    // Inline confirm inside the sheet instead of window.confirm
    shDel.textContent = 'Tap again to confirm delete';
    shDel.style.background = 'rgba(192,72,72,.18)';
    shDel.style.borderColor = 'rgba(192,72,72,.5)';
    shDel.onclick = () => { close(); onDelete(); };
  };
}

// ── Boot ──────────────────────────────────────────────────────
(async()=>{
  // Guard: if Supabase failed to load from CDN
  if(typeof supabase==='undefined') {
    document.getElementById('app').innerHTML='<div class="loading-screen" style="flex-direction:column;gap:12px"><span style="color:var(--red)">⚠ Failed to load Supabase library.</span><span style="font-size:11px;color:var(--text3)">Check your internet connection and reload.</span></div>';
    return;
  }

  try {
    // Single source of truth: getSession on load
    const {data,error} = await sb.auth.getSession();
    if(error) throw error;
    STATE.user = data?.session?.user || null;
    STATE.loading = false;
    if(STATE.user) await fetchAll(); else render();
  } catch(err) {
    document.getElementById('app').innerHTML=`<div class="loading-screen" style="flex-direction:column;gap:12px"><span style="color:var(--red)">⚠ ${err.message||'Connection error'}</span><span style="font-size:11px;color:var(--text3)">Check Supabase URL and key, then reload.</span></div>`;
    return;
  }

  // Listen for login/logout after initial load
  sb.auth.onAuthStateChange(async(_event,session)=>{
    const newUser = session?.user||null;
    const wasLoggedIn = !!STATE.user;
    STATE.user = newUser;
    if(newUser && !wasLoggedIn) { await fetchAll(); }
    else if(!newUser) { STATE.clients=[]; STATE.entries=[]; STATE.invoices=[]; render(); }
  });
})();
</script>
